name: WeChat Article Archive

on:
  workflow_dispatch:
    inputs:
      article_url:
        description: '微信公众号文章 URL'
        required: true
        type: string

permissions:
  contents: write  # 赋予 Actions 修改仓库内容的权限

jobs:
  convert_and_archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies and Run
        run: |
          # 1. 创建虚拟环境 (在当前目录下生成 .venv)
          uv venv

          # 2. 在虚拟环境中安装（不需要 --system，也不怕 PEP 668）
          uv pip install wechat-article-to-markdown playwright

          # 3. 安装浏览器内核 (使用 uv run 自动指向 .venv)
          uv run python -m playwright install chromium

      - name: Convert Article
        run: |
          mkdir -p articles
          # 4. 执行转换 (同样使用 uv run)
          uv run wechat-article-to-markdown "${{ github.event.inputs.article_url }}" --output articles/

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Archive new article from WeChat"
          file_pattern: 'articles/*'
