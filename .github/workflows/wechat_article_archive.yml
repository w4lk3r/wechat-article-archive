name: WeChat Article Archive

on:
  workflow_dispatch:
    inputs:
      article_url:
        description: '微信公众号文章 URL'
        required: true
        type: string

# 必须赋予权限，否则 Action 无法将生成的 Markdown 推送到你的仓库
permissions:
  contents: write

jobs:
  convert_and_archive:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true # 开启 uv 自身的依赖缓存

      # 缓存 Camoufox 浏览器内核，避免每次运行都耗时下载（约节省 1-2 分钟）
      - name: Cache Camoufox Browser
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          # 根据 OS 环境生成缓存 Key，若需强制刷新可修改此处的版本后缀
          key: ${{ runner.os }}-camoufox-v1
          restore-keys: |
            ${{ runner.os }}-camoufox-

      - name: Install dependencies and Browser
        run: |
          # 创建虚拟环境以绕过 Ubuntu 24.04+ 对系统 Python 的 PEP 668 限制
          uv venv
          
          # 在虚拟环境中安装转换工具及 Playwright 依赖
          uv pip install wechat-article-to-markdown playwright
          
          # 仅在缓存未命中时下载 Chromium 浏览器
          if [ "${{ steps.cache-camoufox.outputs.cache-hit }}" != 'true' ]; then
            echo "Cache miss: Installing Camoufox browser..."
            uv run python -m playwright install chromium
          else
            echo "Cache hit: Skipping browser download."
          fi

      - name: Convert Article
        run: |
          # 1. 确保输出根目录存在
          mkdir -p articles
          
          # 执行转换：使用 ${{ github.workspace }} 绝对路径强制纠偏，防止文件落在虚拟环境目录内
          # 工具会自动处理图片本地化，并存放在 articles/文章标题/images 目录下
          uv run wechat-article-to-markdown "${{ github.event.inputs.article_url }}" \
            --output "${{ github.workspace }}/articles"

      - name: Move Results (The "Rescue" Step)
        run: |
          # 2. 暴力纠偏：从工具默认的 site-packages/output 目录中把所有东西搬出来
          # 我们使用通配符 python* 兼容未来可能变化的 Python 版本
          OUTPUT_PATH=$(find .venv/lib/python*/site-packages/ -name "output" -type d | head -n 1)
          
          if [ -d "$OUTPUT_PATH" ] && [ "$(ls -A $OUTPUT_PATH)" ]; then
            echo "发现隐藏在 $OUTPUT_PATH 的文件，正在搬运..."
            cp -r $OUTPUT_PATH/* ${{ github.workspace }}/articles/
            echo "搬运完成！"
          else
            echo "未在默认路径发现文件，可能工具已正确保存或路径异常。"
          fi

      - name: Process Metadata and Update Index
        run: |
          # 1. 遍历 articles 目录下的所有 .md 文件进行 YAML 处理
          # 使用 find 寻找所有 Markdown 文件
          find articles -name "*.md" | while read file; do
            # 检查是否已经包含 YAML 头部（---），防止对同一个文件重复注入
            if ! grep -q "^---" "$file"; then
              echo "正在为 $file 注入 YAML Front Matter..."
              
              # 从文件内容中精准提取元数据
              # 提取标题：找到 # 开头的行并去掉符号
              TITLE=$(grep "^# " "$file" | head -n 1 | sed 's/^# //')
              # 提取作者：找到 "> 公众号:" 并去掉前缀
              AUTHOR=$(grep "> 公众号:" "$file" | sed 's/> 公众号: //')
              # 提取日期：找到 "> 发布时间:" 并去掉前缀
              DATE=$(grep "> 发布时间:" "$file" | sed 's/> 发布时间: //')
              # 提取链接：找到 "> 原文链接:" 并去掉前缀
              SOURCE=$(grep "> 原文链接:" "$file" | sed 's/> 原文链接: //')
          
              # 使用 printf 代替 cat <<EOF，避免 YAML 缩进解析错误
              # %s 会按原样插入变量内容，确保格式安全
              printf -- "---\ntitle: \"%s\"\nauthor: \"%s\"\ndate: \"%s\"\nsource: \"%s\"\n---\n\n" \
                "$TITLE" "$AUTHOR" "$DATE" "$SOURCE" > "$file.tmp"
              
              # 将原内容追加到新生成的头部后面
              cat "$file" >> "$file.tmp"
              mv "$file.tmp" "$file"
            fi
          done

          # 2. 重新生成或更新索引 README.md
          echo "# 微信公众号文章归档库" > README.md
          echo -e "\n本项目通过 GitHub Actions 自动抓取并转换微信文章为 Markdown，方便 AI 阅读。\n" >> README.md
          echo "## 文章列表" >> README.md
          
          # 查找所有文章并按文件名倒序排列，生成超链接列表
          find articles -name "*.md" | sort -r | while read file; do
            # 从处理过的 YAML 头部中重新读取标题和日期
            DISP_TITLE=$(grep "^title: " "$file" | sed 's/title: "//;s/"$//')
            DISP_DATE=$(grep "^date: " "$file" | sed 's/date: "//;s/"$//')
            
            # 如果提取成功，则写入 README 索引
            if [ -n "$DISP_TITLE" ]; then
              echo "- **${DISP_DATE}** | [${DISP_TITLE}](${file})" >> README.md
            fi
          done

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Archive: New WeChat article"
          # 捕获 articles 目录下的所有新增文件（含 Markdown 和图片文件夹）
          file_pattern: 'articles/ README.md'
          # 如果仓库已有同名文件，将进行覆盖更新
          skip_dirty_check: false
