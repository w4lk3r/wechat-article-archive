name: WeChat Article Archive

on:
  workflow_dispatch:
    inputs:
      article_url:
        description: '微信公众号文章 URL'
        required: true
        type: string

permissions:
  contents: write  # 赋予 Actions 修改仓库内容的权限

jobs:
  convert_and_archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          # 加上 --system 告诉 uv 直接安装到 Runner 的全局环境中
          uv pip install --system wechat-article-to-markdown playwright
          
          # 使用 python -m 调用 playwright 确保能正确识别安装路径
          python -m playwright install chromium

      - name: Convert Article
        run: |
          mkdir -p articles
          # 既然已经安装到了全局环境，直接执行即可，不需要 uv run
          wechat-article-to-markdown "${{ github.event.inputs.article_url }}" --output articles/

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Archive new article from WeChat"
          file_pattern: 'articles/*'
